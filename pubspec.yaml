name: clean_arch_gen
description: >
  A CLI tool to generate Flutter Clean Architecture boilerplate.
  Generates core structure, features, and presets with dio, fresh_dio,
  flutter_bloc, go_router, get_it, fpdart, and google_fonts.
version: 0.5.0
homepage: https://github.com/fandiidnaf/clean_arch_gen
repository: https://github.com/fandiidnaf/clean_arch_gen
issue_tracker: https://github.com/fandiidnaf/clean_arch_gen/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.7.0
  path: ^1.9.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0

executables:
  clean_arch_gen: clean_arch_gen

topics:
  - code-generation
  - flutter
  - clean-architecture
  - cli
  - flutter-bloc
